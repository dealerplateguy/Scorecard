<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Scorecard"/>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231B4965' width='100' height='100' rx='20'/><text x='50' y='68' text-anchor='middle' font-size='50' fill='white'>📋</text></svg>"/>
<title>Store Visit Scorecard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow-y:scroll;-webkit-overflow-scrolling:touch}
body{font-family:'DM Sans',sans-serif;color:#1a1a1a;background:#f5f5f3;min-height:100%;padding-bottom:max(80px,env(safe-area-inset-bottom,80px))}
button{font-family:inherit;cursor:pointer;-webkit-appearance:none}
input,textarea{font-family:inherit;-webkit-appearance:none;border-radius:0}

/* Sticky top bar */
.topbar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e8e8e8;padding:12px 16px 0;padding-top:max(12px,env(safe-area-inset-top))}
.topbar h1{font-size:18px;font-weight:700;letter-spacing:-0.3px;text-align:center}
.topbar p{font-size:11px;color:#999;text-align:center;margin:2px 0 10px}
.tabs{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1px solid #e0e0e0;margin-bottom:0}
.tabs button{flex:1;padding:11px 0;border:none;font-size:14px;background:#fff;color:#666;transition:all 0.15s;font-weight:400}
.tabs button.active{background:#1B4965;color:#fff;font-weight:600}

.content{max-width:720px;margin:0 auto;padding:12px 14px 40px}

/* Store pills - horizontal scroll on mobile */
.store-pills{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.store-pills::-webkit-scrollbar{display:none}
.store-pill{padding:8px 16px;border-radius:10px;font-size:14px;border:1px solid #ddd;background:#fff;color:#666;white-space:nowrap;flex-shrink:0;min-height:38px}
.store-pill.active{border:2px solid #1B4965;background:#E6F1FB;color:#1B4965;font-weight:600}

.legend{display:flex;gap:6px;margin-bottom:14px;font-size:12px;color:#999;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:4px}
.legend .dot{width:12px;height:12px;border-radius:50%;display:inline-block}

/* Category cards */
.cat-card{border:1px solid #e8e8e8;border-radius:14px;margin-bottom:12px;overflow:hidden;background:#fff}
.cat-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.cat-header .name{font-weight:600;font-size:14px}
.cat-header .tally{font-size:14px;font-family:'DM Mono',monospace}
.cat-body{padding:4px 12px 8px}

.item-wrap{padding:10px 0;border-bottom:1px solid #f0f0f0}
.item-wrap:last-child{border-bottom:none}
.item-row{display:flex;align-items:center;gap:8px}
.item-text{flex:1;font-size:14px;color:#444;line-height:1.4}

/* Bigger score dots for thumbs */
.score-dots{display:flex;gap:6px}
.score-dot{width:38px;height:38px;border-radius:50%;border:2px solid #ddd;background:transparent;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 0.12s;color:#bbb;min-width:38px}
.score-dot.s0on{border-color:#E24B4A;background:#FCEBEB;color:#791F1F}
.score-dot.s1on{border-color:#EF9F27;background:#FAEEDA;color:#633806}
.score-dot.s2on{border-color:#5CB85C;background:#D4EDDA;color:#1E5631}
.score-dot:active{transform:scale(0.92)}

.comment-input{width:100%;padding:10px 12px;border-radius:10px;font-size:14px;margin-top:8px;box-sizing:border-box}
.comment-fail{border:1px solid #E24B4A;background:#FFF8F8}
.comment-warn{border:1px solid #EF9F27;background:#FFFCF5}
.comment-pass{border:1px solid #5CB85C;background:#F5FFF7}

.photo-strip{margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.photo-thumb-wrap{position:relative;display:inline-block}
.photo-thumb{width:60px;height:60px;object-fit:cover;border-radius:10px;border:1px solid #ddd}
.photo-remove{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:#A32D2D;color:#fff;border:none;font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1}
.add-photo-btn{width:60px;height:60px;border-radius:10px;border:2px dashed #ccc;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#999;font-size:20px}
.add-photo-btn span:last-child{font-size:10px;margin-top:2px}

.notes-area{width:100%;min-height:90px;padding:12px;border-radius:12px;border:1px solid #ddd;font-size:14px;resize:vertical;box-sizing:border-box;background:#fff}

.score-summary{background:#fff;border-radius:14px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;margin-top:14px;border:1px solid #e8e8e8}
.score-num{font-family:'DM Mono',monospace;font-size:28px;font-weight:700}

.submit-btn{width:100%;padding:16px 0;border-radius:12px;border:none;color:#fff;font-size:16px;font-weight:600;margin-top:10px;margin-bottom:60px;min-height:52px}
.submit-btn.on{background:#1B4965}
.submit-btn.off{background:#ccc;cursor:default}
.submit-btn:active.on{background:#15384F}

.badge{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600;white-space:nowrap}
.badge-fail{background:#FCEBEB;color:#A32D2D}
.badge-warn{background:#FAEEDA;color:#854F0B}

.last-visit-bar{background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#888;border:1px solid #e8e8e8}
.followup-box{border:1px solid #E24B4A;border-radius:12px;padding:12px 14px;margin-bottom:14px;background:#FFF8F8}

/* History cards */
.history-card{border:1px solid #e8e8e8;border-radius:14px;padding:14px 16px;margin-bottom:10px;background:#fff}
.history-top{display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer}
.cat-chips{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
.cat-chip{font-size:11px;padding:4px 8px;border-radius:6px;background:#f5f5f3;font-weight:500}
.flag-item{font-size:13px;color:#555;margin-bottom:8px;padding-left:10px}
.flag-fail{border-left:3px solid #E24B4A}
.flag-warn{border-left:3px solid #EF9F27}

/* Action buttons in history */
.action-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px}
.btn-report{padding:10px 16px;border-radius:8px;border:none;background:#1B4965;color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;min-height:42px}
.btn-report:active{background:#15384F}
.btn-delete{padding:8px 12px;border-radius:8px;border:1px solid #e0e0e0;background:#fff;color:#999;font-size:12px;min-height:38px}
.confirm-delete{display:flex;gap:6px;align-items:center}
.confirm-delete span{font-size:12px;color:#A32D2D;font-weight:500}
.confirm-delete button{padding:6px 12px;border-radius:8px;font-size:12px;min-height:34px}
.btn-yes-delete{border:1px solid #A32D2D;background:#FCEBEB;color:#A32D2D;font-weight:600}
.btn-cancel-delete{border:1px solid #ddd;background:#fff;color:#888}

/* Dashboard */
.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.dash-card{background:#fff;border-radius:12px;padding:14px 12px;text-align:center;border:1px solid #e8e8e8}
.dash-pct{font-family:'DM Mono',monospace;font-size:26px;font-weight:700}

.trend-up{color:#0F6E56;font-size:12px;font-weight:600}
.trend-down{color:#A32D2D;font-size:12px;font-weight:600}
.trend-flat{color:#888;font-size:12px}

/* Report / print view */
.report-view{background:#fff;padding:0 14px 40px}
.report-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;border-bottom:2px solid #1B4965;padding-bottom:12px}
.report-cat{margin-bottom:12px;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden}
.report-cat-head{padding:8px 14px;font-size:13px;font-weight:600}
.report-item{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 14px;border-bottom:1px solid #f0f0f0}
.report-item:last-child{border-bottom:none}
.report-score-tag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;white-space:nowrap}
.print-bar{display:flex;gap:8px;padding:16px 0;flex-wrap:wrap}
.print-bar button{padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;min-height:46px}

@media print{
  .no-print{display:none!important}
  .topbar{position:static;border:none;padding:0}
  body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact;padding:12px}
  @page{margin:0.4in}
  .report-view{padding:0}
}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:#999}
.empty p:first-child{font-size:16px;font-weight:500;margin-bottom:6px}
.empty p:last-child{font-size:14px}
</style>
</head>
<body>
<div id="topbar" class="topbar">
  <h1>Store visit scorecard</h1>
  <p>Fixed Ops Director — Rohrman Automotive Group</p>
  <div class="tabs" id="tabs"></div>
</div>
<div class="content" id="app"></div>

<script>
const STORES=["Honda","Toyota","Kia","Hyundai","Indy Hyundai","Body Shop"];
const CATEGORIES=[
{name:"Facility + compliance",items:["Parts cages and cashier cages operational and locked","Doors, locks operational (Parts, Service, IT, Facility)","Shop equipment operational","Safety manuals + PPE accessible in shops","Chemicals stored correctly — labeled, in metal cabinets","Abandoned vehicles handled properly","Shop clean + organized, bays efficient","After close: all documents locked up, no PII visible on desks"]},
{name:"Manager scoreboard + controllables",items:["Pursuit Points on pace for 70+ goal","Service GP at or above 75%","CP YoY growth positive","Open ROs at or below goal","ROs over 30 days resolved or escalated","A/R current (warranty, service, parts within windows)","Daily shop huddles held (document time)","Friday Toolbox Talks notebook review","Manager has a clear plan for the week"]},
{name:"Process + accounting",items:["Labor ops proper for accounting compliance","Technician video utilization on track","RecovR / PDI / UCI processes followed","Appointments per day at or above goal","Video sent 75%+ and viewed 25%+","Email capture at 90%+ standard"]},
{name:"Shop floor + advisor coaching",items:["Alignment penetration at 10%+","Tires penetration at 15%+","Valvoline penetration at 23%+","Advisor CP Hrs/RO at 1.5+ standard","Tech efficiency — review 4-week avg hours per tech","Coaching done with lowest-performing advisor","Coupon % of CP Gross within 3% standard","Shop morale — talk to a couple techs, pulse check"]},
{name:"Visit closeout",items:["Action items confirmed with manager (who, what, when)","To Do + Waiting On lists updated in Microsoft To Do","Accountability checklist signed for the month"]}
];
const TOTAL_POSSIBLE=CATEGORIES.reduce((s,c)=>s+c.items.length*2,0);
const PC=[{bg:"#1B4965",text:"#B5D4F4"},{bg:"#0F6E56",text:"#9FE1CB"},{bg:"#854F0B",text:"#FAC775"},{bg:"#534AB7",text:"#CECBF6"},{bg:"#5F5E5A",text:"#D3D1C7"}];
const SK="scorecard-data-v3";

function getGrade(s,p){p=p||TOTAL_POSSIBLE;if(s===0)return{label:"Not scored",color:"#888"};const pct=Math.round(s/p*100);if(pct>=90)return{label:pct+"% — Excellent",color:"#0F6E56"};if(pct>=75)return{label:pct+"% — Strong",color:"#1B4965"};if(pct>=60)return{label:pct+"% — Needs improvement",color:"#BA7517"};return{label:pct+"% — Action plan required",color:"#A32D2D"};}
function fD(d){return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function fS(d){return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function trend(c,p){if(p==null)return"";const d=c-p;if(d===0)return'<span class="trend-flat">—</span>';if(d>0)return'<span class="trend-up">+'+d+' ▲</span>';return'<span class="trend-down">'+d+' ▼</span>';}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

let S={view:"score",store:null,storeConfirmed:false,scores:{},comments:{},photos:{},notes:"",history:[],expanded:null,confirmDel:null,report:null,histFilter:"All"};
const DK="scorecard-draft-v3";

function load(){try{const d=JSON.parse(localStorage.getItem(SK));if(d&&d.history)S.history=d.history;}catch(e){}try{const dr=JSON.parse(localStorage.getItem(DK));if(dr){S.scores=dr.scores||{};S.comments=dr.comments||{};S.photos=dr.photos||{};S.notes=dr.notes||"";S.store=dr.store||null;S.storeConfirmed=!!dr.store;}}catch(e){}}
function save(){localStorage.setItem(SK,JSON.stringify({history:S.history}));}
function saveDraft(){localStorage.setItem(DK,JSON.stringify({scores:S.scores,comments:S.comments,photos:S.photos,notes:S.notes,store:S.store}));}
function clearDraft(){S.scores={};S.comments={};S.photos={};S.notes="";S.store=null;S.storeConfirmed=false;localStorage.removeItem(DK);}
function compress(file,cb){const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement("canvas");let w=img.width,h=img.height;if(w>800){h=800/w*h;w=800;}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);cb(c.toDataURL("image/jpeg",0.6));};img.src=e.target.result;};r.readAsDataURL(file);}
function lastVisit(s){return S.history.find(h=>h.store===s);}
function storeHist(s){return S.history.filter(h=>h.store===s);}

function renderTabs(){
  const t=document.getElementById("tabs");
  const labels=["Score a visit","History","Dashboard"];
  const keys=["score","history","dashboard"];
  t.innerHTML=keys.map((k,i)=>'<button class="'+(S.view===k?"active":"")+'" onclick="S.view=\''+k+'\';render()">'+labels[i]+'</button>').join("");
}

function render(){
const app=document.getElementById("app");
const tb=document.getElementById("topbar");
renderTabs();

// ═══ REPORT VIEW ═══
if(S.report){
  tb.style.display="none";
  const pe=S.report,pg=getGrade(pe.total,pe.possible),pf=pe.flaggedItems||[],pfail=pf.filter(f=>f.score===0),pnw=pf.filter(f=>f.score===1),det=pe.details||{},com=pe.comments||{};
  let h='<div class="report-view">';
  h+='<div class="print-bar no-print">';
  h+='<button onclick="S.report=null;render()" style="border:1px solid #ddd;background:#fff;color:#666">← Back</button>';
  h+='<button onclick="doPrint()" style="border:none;background:#1B4965;color:#fff">🖨️ Print</button>';
  h+='<button onclick="downloadPDF()" id="pdf-btn" style="border:none;background:#0F6E56;color:#fff">📄 Download PDF</button>';
  h+='</div>';
  h+='<div class="report-header"><div>';
  h+='<h1 style="font-size:18px;font-weight:700">'+pe.store+' — Visit Report</h1>';
  h+='<p style="font-size:12px;color:#888;margin-top:4px">Fixed Ops Director — Rohrman Automotive Group | '+fD(pe.date)+'</p>';
  h+='</div><div style="text-align:right">';
  h+='<div style="font-family:DM Mono,monospace;font-size:26px;font-weight:700">'+pe.total+'/'+pe.possible+'</div>';
  h+='<div style="font-size:12px;color:'+pg.color+';font-weight:600">'+pg.label+'</div>';
  h+='</div></div>';
  CATEGORIES.forEach((cat,ci)=>{
    const cs=pe.catScores?.[ci];const cpct=cs?Math.round(cs.score/cs.possible*100):0;
    h+='<div class="report-cat"><div class="report-cat-head" style="background:'+PC[ci].bg+';color:'+PC[ci].text+'">'+(ci+1)+'. '+cat.name+' — '+(cs?cs.score:0)+'/'+(cs?cs.possible:cat.items.length*2)+' ('+cpct+'%)</div>';
    cat.items.forEach((item,ii)=>{
      const key=ci+'-'+ii,val=det[key],flag=pf.find(f=>f.key===key),comment=flag?flag.comment||'':com[key]||'',photos=flag?flag.photos||[]:[];
      const sl=val===0?'FAILING':val===1?'NEEDS WORK':val===2?'MEETS STD':'—';
      const sb=val===0?'#FCEBEB':val===1?'#FAEEDA':val===2?'#D4EDDA':'#f5f5f3';
      const sc=val===0?'#A32D2D':val===1?'#854F0B':val===2?'#1E5631':'#999';
      h+='<div class="report-item"><div style="flex:1;font-size:12px;color:#444">'+esc(item);
      if(comment)h+='<div style="color:#777;font-style:italic;margin-top:2px;font-size:11px">'+esc(comment)+'</div>';
      if(photos.length>0){h+='<div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap">';photos.forEach(p=>{h+='<img src="'+p+'" style="width:80px;height:60px;object-fit:cover;border-radius:4px;border:1px solid #ddd"/>';});h+='</div>';}
      h+='</div><div style="margin-left:8px;flex-shrink:0"><span class="report-score-tag" style="background:'+sb+';color:'+sc+'">'+sl+'</span></div></div>';
    });
    h+='</div>';
  });
  if(pe.notes)h+='<div style="margin-top:12px;padding-top:10px;border-top:1px solid #ddd;margin-bottom:20px"><h3 style="font-size:13px;font-weight:600;margin-bottom:6px">Visit Notes</h3><div style="background:#f8f8f6;border-radius:8px;padding:10px;font-size:12px;font-style:italic;color:#666">'+esc(pe.notes)+'</div></div>';
  h+='</div>';
  app.innerHTML=h;return;
}

tb.style.display="";
let h="";

// ═══ SCORE VIEW ═══
if(S.view==="score"){

  // ── STORE PICKER (must pick before scoring) ──
  if(!S.storeConfirmed){
    h+='<div style="padding:30px 0;text-align:center">';
    h+='<div style="font-size:20px;font-weight:700;margin-bottom:6px">Which store are you visiting?</div>';
    h+='<p style="font-size:14px;color:#888;margin-bottom:24px">Select a store to begin your inspection</p>';
    h+='<div style="display:flex;flex-direction:column;gap:10px;max-width:320px;margin:0 auto">';
    STORES.forEach(s=>{
      h+='<button onclick="pickStore(\''+s.replace(/'/g,"\\'")+'\')" style="padding:16px 20px;border-radius:12px;border:1px solid #ddd;background:#fff;font-size:16px;font-weight:500;color:#1a1a1a;text-align:left;min-height:52px;display:flex;align-items:center;justify-content:space-between">';
      h+=s+'<span style="color:#ccc;font-size:14px">→</span></button>';
    });
    h+='</div></div>';
  } else {

  // ── LOCKED STORE HEADER ──
  const lv=lastVisit(S.store),prevFlags=lv?lv.flaggedItems||[]:[],totalScore=Object.values(S.scores).reduce((a,v)=>a+v,0),grade=getGrade(totalScore);
  h+='<div style="display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:12px 16px;margin-bottom:14px">';
  h+='<div style="font-size:18px;font-weight:700;color:#1B4965">📍 '+S.store+'</div>';
  h+='<button onclick="changeStore()" style="padding:6px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#888;font-size:12px;font-weight:500">Change</button>';
  h+='</div>';

  if(lv)h+='<div class="last-visit-bar">Last visit: '+fD(lv.date)+' — '+lv.total+'/'+lv.possible+' ('+Math.round(lv.total/lv.possible*100)+'%)</div>';
  if(prevFlags.length>0){
    h+='<div class="followup-box"><div style="font-weight:600;font-size:13px;color:#A32D2D;margin-bottom:8px">Follow-ups from last visit ('+fS(lv.date)+')</div>';
    prevFlags.forEach(f=>{
      h+='<div style="font-size:13px;color:#555;margin-bottom:8px;padding-left:10px;border-left:3px solid '+(f.score===0?'#E24B4A':'#EF9F27')+'">';
      h+='<span class="badge '+(f.score===0?'badge-fail':'badge-warn')+'">'+(f.score===0?'FAILING':'NEEDS WORK')+'</span> <span style="font-weight:500">'+esc(f.item)+'</span>';
      if(f.comment)h+='<div style="color:#888;font-style:italic;margin-top:2px;font-size:12px">'+esc(f.comment)+'</div>';
      if(f.photos&&f.photos.length>0){h+='<div style="display:flex;gap:4px;margin-top:4px">';f.photos.forEach(p=>{h+='<img src="'+p+'" style="width:44px;height:44px;object-fit:cover;border-radius:8px;border:1px solid #ddd"/>';});h+='</div>';}
      h+='</div>';
    });
    h+='</div>';
  }
  h+='<div class="legend"><span><span class="dot" style="background:#FCEBEB;border:1px solid #E24B4A"></span> 0 = failing</span><span><span class="dot" style="background:#FAEEDA;border:1px solid #EF9F27"></span> 1 = needs work</span><span><span class="dot" style="background:#D4EDDA;border:1px solid #5CB85C"></span> 2 = meets standard</span></div>';

  CATEGORIES.forEach((cat,ci)=>{
    const pc=PC[ci],catTotal=cat.items.reduce((a,_,ii)=>a+(S.scores[ci+'-'+ii]||0),0);
    h+='<div class="cat-card"><div class="cat-header" style="background:'+pc.bg+'"><span class="name" style="color:'+pc.text+'">'+(ci+1)+'. '+cat.name+'</span><span class="tally" style="color:'+pc.text+'">'+catTotal+'/'+(cat.items.length*2)+'</span></div><div class="cat-body">';
    cat.items.forEach((item,ii)=>{
      const key=ci+'-'+ii,val=S.scores[key],nc=val!==undefined,pf=prevFlags.find(f=>f.key===key);
      h+='<div class="item-wrap"><div class="item-row"><div class="item-text">'+esc(item);
      if(pf)h+=' <span class="badge '+(pf.score===0?'badge-fail':'badge-warn')+'">'+(pf.score===0?'FAILING':'NEEDS WORK')+'</span>';
      h+='</div><div class="score-dots">';
      [0,1,2].forEach(v=>{h+='<button class="score-dot '+(val===v?'s'+v+'on':'')+'" onclick="doScore('+ci+','+ii+','+v+')">'+v+'</button>';});
      h+='</div></div>';
      if(pf&&pf.comment&&val===undefined)h+='<div style="font-size:12px;color:#999;font-style:italic;margin-top:4px;margin-left:4px">Last visit: '+esc(pf.comment)+'</div>';
      if(nc){
        const cClass=val===0?'comment-fail':val===1?'comment-warn':'comment-pass';
        const cPlaceholder=val===0?"What's failing? What needs to happen?":val===1?"What needs improvement?":"Notes (optional)";
        h+='<input type="text" class="comment-input '+cClass+'" placeholder="'+cPlaceholder+'" value="'+esc(S.comments[key]||'')+'" oninput="S.comments[\''+key+'\']=this.value;saveDraft()"/>';
        const ph=S.photos[key]||[];
        h+='<div class="photo-strip">';
        ph.forEach((p,pi)=>{h+='<div class="photo-thumb-wrap"><img class="photo-thumb" src="'+p+'"/><button class="photo-remove" onclick="rmPhoto(\''+key+'\','+pi+')">×</button></div>';});
        if(ph.length<5)h+='<button class="add-photo-btn" onclick="addPhoto(\''+key+'\')"><span>📷</span><span>Add</span></button>';
        h+='</div>';
      }
      h+='</div>';
    });
    h+='</div></div>';
  });

  h+='<div style="margin-top:12px"><label style="font-size:14px;font-weight:500;color:#555;display:block;margin-bottom:6px">Overall visit notes</label>';
  h+='<textarea class="notes-area" placeholder="Key observations, action items, follow-ups..." oninput="S.notes=this.value;saveDraft()">'+esc(S.notes)+'</textarea></div>';

  const fc=Object.values(S.scores).filter(v=>v===0).length,wc=Object.values(S.scores).filter(v=>v===1).length;
  h+='<div class="score-summary"><div><div style="font-weight:600;font-size:16px">'+S.store+' — visit score</div>';
  h+='<div style="font-size:13px;color:'+grade.color+';font-weight:500;margin-top:2px">'+grade.label;
  if(lv)h+=' '+trend(totalScore,lv.total);
  h+='</div>';
  if(fc+wc>0)h+='<div style="font-size:12px;color:#A32D2D;margin-top:4px">'+fc+' failing, '+wc+' needs work</div>';
  h+='</div><div class="score-num">'+totalScore+'/'+TOTAL_POSSIBLE+'</div></div>';
  h+='<button class="submit-btn '+(totalScore>0?'on':'off')+'" '+(totalScore>0?'onclick="submitVisit()"':'disabled')+'>Save visit score</button>';

  } // end storeConfirmed
}

// ═══ HISTORY VIEW ═══
if(S.view==="history"){
  if(S.history.length===0){h+='<div class="empty"><p>No visits recorded yet</p><p>Score your first store visit to start tracking</p></div>';}
  else{
    h+='<div class="store-pills">';
    ["All",...STORES].forEach(s=>{h+='<button class="store-pill '+(S.histFilter===s?"active":"")+'" onclick="S.histFilter=\''+s.replace(/'/g,"\\'")+'\';render()">'+s+'</button>';});
    h+='</div>';
    const list=S.histFilter==="All"?S.history:S.history.filter(e=>e.store===S.histFilter);
    list.forEach(entry=>{
      const g=getGrade(entry.total,entry.possible),sh=storeHist(entry.store),idx=sh.findIndex(e=>e.id===entry.id),prev=sh[idx+1],isExp=S.expanded===entry.id,flags=entry.flaggedItems||[],hasP=flags.some(f=>f.photos&&f.photos.length>0);
      h+='<div class="history-card"><div class="history-top" onclick="S.expanded='+(isExp?'null':entry.id)+';render()"><div>';
      h+='<div style="font-weight:600;font-size:16px">'+entry.store+(hasP?' 📷':'')+' <span style="font-weight:400;font-size:12px;color:#999">'+(isExp?'▾':'▸')+'</span></div>';
      h+='<div style="font-size:12px;color:#999;margin-top:2px">'+fD(entry.date)+'</div>';
      if(flags.length>0)h+='<div style="font-size:11px;margin-top:4px"><span style="color:#A32D2D">'+flags.filter(f=>f.score===0).length+' failing</span><span style="color:#854F0B;margin-left:8px">'+flags.filter(f=>f.score===1).length+' needs work</span></div>';
      h+='</div><div style="text-align:right"><div style="font-family:DM Mono,monospace;font-weight:700;font-size:22px">'+entry.total+'/'+entry.possible+'</div>';
      h+='<div style="font-size:12px;color:'+g.color+';font-weight:500">'+g.label+(prev?' '+trend(entry.total,prev.total):'')+'</div></div></div>';
      h+='<div class="cat-chips">';
      entry.catScores.forEach((cs,i)=>{const cp=Math.round(cs.score/cs.possible*100);const col=cp>=90?'#0F6E56':cp>=75?'#1B4965':cp>=60?'#BA7517':'#A32D2D';h+='<div class="cat-chip" style="color:'+col+'">'+cs.name.split("+")[0].trim()+': '+cs.score+'/'+cs.possible+'</div>';});
      h+='</div>';
      if(isExp){
        h+='<div style="margin-top:12px;border-top:1px solid #f0f0f0;padding-top:10px">';
        if(flags.length>0){
          h+='<div style="margin-bottom:10px"><div style="font-weight:600;font-size:13px;color:#555;margin-bottom:6px">Flagged items</div>';
          flags.forEach(f=>{
            h+='<div class="flag-item '+(f.score===0?'flag-fail':'flag-warn')+'"><span class="badge '+(f.score===0?'badge-fail':'badge-warn')+'">'+(f.score===0?'FAILING':'NEEDS WORK')+'</span> '+esc(f.item);
            if(f.comment)h+='<div style="color:#555;margin-top:3px;padding:4px 8px;background:'+(f.score===0?'#FFF0F0':'#FFFBF0')+';border-radius:6px;font-size:12px">'+esc(f.comment)+'</div>';
            if(f.photos&&f.photos.length>0){h+='<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">';f.photos.forEach(p=>{h+='<img src="'+p+'" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #ddd"/>';});h+='</div>';}
            h+='</div>';
          });
          h+='</div>';
        }
        if(entry.notes)h+='<div style="font-size:13px;color:#777;font-style:italic;line-height:1.5;margin-bottom:10px">'+esc(entry.notes)+'</div>';
        h+='<div class="action-row">';
        h+='<button class="btn-report" onclick="S.report=S.history.find(e=>e.id==='+entry.id+');render()"><span>📋</span> View & Print Report</button>';
        if(S.confirmDel===entry.id){
          h+='<div class="confirm-delete"><span>Delete?</span><button class="btn-yes-delete" onclick="delEntry('+entry.id+')">Yes</button><button class="btn-cancel-delete" onclick="S.confirmDel=null;render()">No</button></div>';
        }else{
          h+='<button class="btn-delete" onclick="S.confirmDel='+entry.id+';render()">Delete</button>';
        }
        h+='</div></div>';
      }
      h+='</div>';
    });
  }
}

// ═══ DASHBOARD VIEW ═══
if(S.view==="dashboard"){
  h+='<div class="dashboard-grid">';
  STORES.forEach(s=>{
    const sh=storeHist(s),latest=sh[0],prev=sh[1];
    if(!latest){h+='<div class="dash-card"><div style="font-weight:600;font-size:14px;margin-bottom:4px">'+s+'</div><div style="font-size:12px;color:#ccc">No visits</div></div>';return;}
    const pct=Math.round(latest.total/latest.possible*100),g=getGrade(latest.total,latest.possible),flags=latest.flaggedItems||[];
    h+='<div class="dash-card"><div style="font-weight:600;font-size:14px;margin-bottom:2px">'+s+'</div>';
    h+='<div class="dash-pct" style="color:'+g.color+'">'+pct+'%</div>';
    h+='<div style="font-size:11px;color:#999">'+fS(latest.date)+'</div>';
    if(prev)h+='<div style="margin-top:4px">'+trend(latest.total,prev.total)+'</div>';
    if(flags.length>0)h+='<div style="font-size:10px;color:#A32D2D;margin-top:4px">'+flags.length+' flagged</div>';
    h+='</div>';
  });
  h+='</div>';

  h+='<h3 style="font-size:16px;font-weight:600;margin-bottom:10px">Open follow-up items</h3>';
  const af=STORES.flatMap(s=>{const l=storeHist(s)[0];if(!l)return[];return(l.flaggedItems||[]).map(f=>({...f,store:s}));});
  if(af.length===0)h+='<p style="font-size:14px;color:#999;margin-bottom:20px">No open follow-ups. All stores passing.</p>';
  else{
    const fail=af.filter(f=>f.score===0),nw=af.filter(f=>f.score===1);
    if(fail.length>0){h+='<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:600;color:#A32D2D;margin-bottom:6px">Failing ('+fail.length+')</div>';fail.forEach(f=>{h+='<div class="flag-item flag-fail"><b>'+f.store+'</b> — '+esc(f.item);if(f.comment)h+='<div style="color:#888;font-style:italic;margin-top:1px">'+esc(f.comment)+'</div>';h+='</div>';});h+='</div>';}
    if(nw.length>0){h+='<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:600;color:#854F0B;margin-bottom:6px">Needs work ('+nw.length+')</div>';nw.forEach(f=>{h+='<div class="flag-item flag-warn"><b>'+f.store+'</b> — '+esc(f.item);if(f.comment)h+='<div style="color:#888;font-style:italic;margin-top:1px">'+esc(f.comment)+'</div>';h+='</div>';});h+='</div>';}
  }

  h+='<h3 style="font-size:16px;font-weight:600;margin-bottom:10px;margin-top:20px">Category breakdown</h3>';
  CATEGORIES.forEach((cat,ci)=>{
    h+='<div style="margin-bottom:14px"><div style="font-size:14px;font-weight:600;color:'+PC[ci].bg+';margin-bottom:6px">'+(ci+1)+'. '+cat.name+'</div><div style="display:flex;gap:8px;flex-wrap:wrap">';
    STORES.forEach(s=>{const l=storeHist(s)[0];if(!l)return;const cs=l.catScores[ci],pct=Math.round(cs.score/cs.possible*100);const col=pct>=90?'#D4EDDA':pct>=75?'#E6F1FB':pct>=60?'#FAEEDA':'#FCEBEB';const tc=pct>=90?'#1E5631':pct>=75?'#0C447C':pct>=60?'#633806':'#791F1F';h+='<div style="background:'+col+';border-radius:8px;padding:6px 10px;font-size:12px;font-weight:500;color:'+tc+';min-width:80px;text-align:center"><div style="font-size:11px;opacity:0.8">'+s+'</div><div style="font-family:DM Mono,monospace;font-size:15px;font-weight:700">'+cs.score+'/'+cs.possible+'</div></div>';});
    h+='</div></div>';
  });

  if(S.history.length>0){
    h+='<div style="margin-top:20px"><h3 style="font-size:16px;font-weight:600;margin-bottom:10px">Recent timeline</h3>';
    S.history.slice(0,15).forEach(e=>{const g=getGrade(e.total,e.possible),pct=Math.round(e.total/e.possible*100),flags=e.flaggedItems||[];
    h+='<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0"><div style="width:10px;height:10px;border-radius:50%;background:'+g.color+';flex-shrink:0"></div><div style="flex:1;font-size:14px"><span style="font-weight:600">'+e.store+'</span><span style="color:#999;margin-left:8px">'+fS(e.date)+'</span>';
    if(flags.length>0)h+='<span style="color:#A32D2D;margin-left:8px;font-size:11px">'+flags.length+' flagged</span>';
    h+='</div><div style="font-family:DM Mono,monospace;font-size:15px;font-weight:600;color:'+g.color+'">'+pct+'%</div></div>';});
    h+='</div>';
  }
}

app.innerHTML=h;
}

// ═══ ACTIONS ═══
function pickStore(s){S.store=s;S.storeConfirmed=true;saveDraft();render();}
function changeStore(){S.storeConfirmed=false;render();}
function doScore(ci,ii,v){const k=ci+'-'+ii;if(S.scores[k]===v){delete S.scores[k];delete S.comments[k];delete S.photos[k];}else{S.scores[k]=v;}saveDraft();render();}
function addPhoto(key){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.capture='environment';inp.onchange=()=>{if(inp.files[0])compress(inp.files[0],url=>{if(!S.photos[key])S.photos[key]=[];if(S.photos[key].length<5)S.photos[key].push(url);saveDraft();render();});};inp.click();}
function rmPhoto(key,idx){if(S.photos[key]){S.photos[key].splice(idx,1);if(S.photos[key].length===0)delete S.photos[key];}saveDraft();render();}
function submitVisit(){
  const ts=Object.values(S.scores).reduce((a,v)=>a+v,0);
  const cs=CATEGORIES.map((cat,ci)=>({name:cat.name,score:cat.items.reduce((a,_,ii)=>a+(S.scores[ci+'-'+ii]||0),0),possible:cat.items.length*2}));
  const fi=[];Object.entries(S.scores).forEach(([k,v])=>{if(v<=1){const[ci,ii]=k.split('-').map(Number);fi.push({category:CATEGORIES[ci].name,item:CATEGORIES[ci].items[ii],score:v,comment:S.comments[k]||'',key:k,photos:S.photos[k]||[]});}});
  S.history.unshift({id:Date.now(),store:S.store,date:new Date().toISOString(),total:ts,possible:TOTAL_POSSIBLE,catScores:cs,notes:S.notes,details:{...S.scores},comments:{...S.comments},flaggedItems:fi});
  save();clearDraft();S.view='history';render();
}
function delEntry(id){S.history=S.history.filter(e=>e.id!==id);S.confirmDel=null;save();render();}

function doPrint(){
  try{window.print();return;}catch(e){}
  try{
    const html=document.documentElement.outerHTML;
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const w=window.open(url,'_blank');
    if(w){w.onload=function(){setTimeout(function(){w.print();},500);};return;}
  }catch(e){}
  const msg=document.createElement('div');
  msg.style.cssText='position:fixed;top:0;left:0;right:0;padding:16px;background:#1B4965;color:#fff;text-align:center;font-size:14px;z-index:9999';
  msg.textContent='Tap the Share button (□↑) in your browser → choose Print';
  document.body.appendChild(msg);
  setTimeout(()=>{msg.remove();},6000);
}

async function downloadPDF(){
  const btn=document.getElementById('pdf-btn');
  if(btn){btn.textContent='⏳ Generating...';btn.disabled=true;}
  try{
    if(!window.jspdf){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const{jsPDF}=window.jspdf;
    const pe=S.report;if(!pe)return;
    const pg=getGrade(pe.total,pe.possible),pf=pe.flaggedItems||[],det=pe.details||{},com=pe.comments||{};
    const doc=new jsPDF({unit:'pt',format:'letter'});
    const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight(),m=40,uw=W-m*2;
    let y=40;
    const chk=(n)=>{if(y+n>H-40){doc.addPage();y=40;}};

    // Title
    doc.setFontSize(18);doc.setFont('helvetica','bold');doc.setTextColor(30);
    doc.text(pe.store+' — Store Visit Report',m,y);y+=20;
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(120);
    doc.text('Fixed Ops Director — Rohrman Automotive Group  |  '+fD(pe.date),m,y);y+=20;

    // Score line
    doc.setDrawColor(27,73,101);doc.setLineWidth(1.5);doc.line(m,y,W-m,y);y+=18;
    doc.setFontSize(22);doc.setFont('helvetica','bold');doc.setTextColor(30);
    doc.text(pe.total+' / '+pe.possible,m,y);
    doc.setFontSize(12);
    const gc=pg.color,cr=parseInt(gc.slice(1,3),16),cg=parseInt(gc.slice(3,5),16),cb=parseInt(gc.slice(5,7),16);
    doc.setTextColor(cr,cg,cb);doc.text(pg.label,m+110,y);y+=22;
    doc.setTextColor(30);

    // Categories
    CATEGORIES.forEach((cat,ci)=>{
      const cs=pe.catScores?.[ci];const cpct=cs?Math.round(cs.score/cs.possible*100):0;
      chk(28);
      doc.setFillColor(27,73,101);doc.rect(m,y-11,uw,20,'F');
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(255);
      doc.text((ci+1)+'. '+cat.name+' — '+(cs?cs.score:0)+'/'+(cs?cs.possible:cat.items.length*2)+' ('+cpct+'%)',m+6,y+2);
      y+=18;doc.setTextColor(30);

      cat.items.forEach((item,ii)=>{
        const key=ci+'-'+ii,val=det[key],flag=pf.find(f=>f.key===key);
        const comment=flag?flag.comment||'':com[key]||'';
        const sl=val===0?'FAILING':val===1?'NEEDS WORK':val===2?'MEETS STD':'—';
        chk(comment?32:16);
        doc.setFontSize(9);doc.setFont('helvetica','normal');

        // Score label
        const lw=doc.getTextWidth(sl);
        if(val===0)doc.setTextColor(163,45,45);
        else if(val===1)doc.setTextColor(133,79,11);
        else if(val===2)doc.setTextColor(15,110,86);
        else doc.setTextColor(150);
        doc.text(sl,W-m-lw,y);

        // Item
        doc.setTextColor(60);
        const mw=uw-lw-20;
        const il=doc.splitTextToSize(item,mw);
        il.forEach((ln,li)=>{if(li>0)chk(12);doc.text(ln,m+6,y);if(li<il.length-1)y+=11;});
        y+=13;

        if(comment){
          doc.setTextColor(120);doc.setFontSize(8);
          const cl=doc.splitTextToSize('> '+comment,uw-20);
          cl.forEach(ln=>{chk(11);doc.text(ln,m+12,y);y+=10;});
          y+=2;
        }
        doc.setTextColor(30);
      });
      y+=8;
    });

    // Notes
    if(pe.notes){
      chk(36);
      doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(30);
      doc.text('Visit Notes',m,y);y+=14;
      doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(100);
      const nl=doc.splitTextToSize(pe.notes,uw);
      nl.forEach(ln=>{chk(12);doc.text(ln,m,y);y+=12;});
    }

    // Photos section
    const photosToAdd=[];
    pf.forEach(f=>{if(f.photos&&f.photos.length>0)f.photos.forEach(p=>photosToAdd.push({item:f.item,src:p}));});
    if(photosToAdd.length>0){
      chk(30);y+=6;
      doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(30);
      doc.text('Photo Documentation',m,y);y+=16;
      for(const ph of photosToAdd){
        chk(120);
        doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(80);
        doc.text(ph.item,m,y);y+=10;
        try{doc.addImage(ph.src,'JPEG',m,y,140,105);y+=112;}catch(e){y+=4;}
      }
    }

    const fn=pe.store.replace(/\s+/g,'_')+'_Visit_'+new Date(pe.date).toISOString().slice(0,10)+'.pdf';
    doc.save(fn);
    if(btn){btn.textContent='✅ Downloaded!';setTimeout(()=>{btn.textContent='📄 Download PDF';btn.disabled=false;},3000);}
  }catch(err){
    console.error('PDF error:',err);
    if(btn){btn.textContent='❌ Error — try again';setTimeout(()=>{btn.textContent='📄 Download PDF';btn.disabled=false;},3000);}
  }
}

load();render();
</script>
</body>
